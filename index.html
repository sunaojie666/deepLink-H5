<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>VicastCam</title>
    <link rel="preconnect" href="https://res.opoinstalljs.com" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="embedded-browser-guide" id="embeddedBrowserGuide" hidden>
      <img class="browser-guide-image" id="browserGuideImage" src="" alt="" />
    </main>

    <main class="invite-page" id="invitePage" hidden>
      <section class="invite-shell" aria-label="VicastCam">
        <header class="invite-heading">
          <h1>
            <span class="brand-word" data-i18n="inviteBrand"></span>
            <span data-i18n="inviteTitle"></span>
          </h1>
          <p data-i18n="inviteDescription"></p>
        </header>

        <img
          class="ecosystem-visual"
          src="./assets/invite-ecosystem.png"
          alt=""
          width="640"
          height="640"
          fetchpriority="high"
        />

        <div class="feature-grid" aria-label="VicastCam features">
          <article class="feature-card">
            <img src="./assets/feature-mobile-live.png" alt="" width="121" height="97" />
            <span data-i18n="featureMobileLive"></span>
          </article>
          <article class="feature-card">
            <img src="./assets/feature-desktop-camera.png" alt="" width="121" height="97" />
            <span data-i18n="featureDesktopCamera"></span>
          </article>
          <article class="feature-card">
            <img src="./assets/feature-cast-control.png" alt="" width="121" height="97" />
            <span data-i18n="featureCastControl"></span>
          </article>
          <article class="feature-card">
            <img src="./assets/feature-live-coverage.png" alt="" width="129" height="129" />
            <span data-i18n="featureLiveCoverage"></span>
          </article>
        </div>

        <div class="invite-code sr-only" id="inviteCodeRow" hidden>
          <span data-i18n="inviteCode"></span>
          <strong id="inviteCodeValue"></strong>
        </div>

        <div class="invite-action">
          <button class="primary-action" id="downloadButton" type="button" disabled>
            <span id="buttonLabel"></span>
          </button>
          <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <noscript><div class="noscript-message">JavaScript is required to continue.</div></noscript>
  </body>
</html>
